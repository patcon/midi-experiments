</head>
<body>

<header>
  <h1>BK Crossfader</h1>
  <div class="sub">Banjo-Kazooie · MIDI Blend Mixer</div>
</header>

<div class="card">
  <div class="panel-header">
    <div>
      <div class="panel-title">Track Library</div>
      <div class="panel-hint" id="lib-hint">No tracks loaded — upload a .mid file to begin</div>
    </div>
    <button class="upload-trigger" id="upload-btn">
      <svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M6 8V2M3 5l3-3 3 3M2 10h8"/>
      </svg>
      Upload MIDI
    </button>
    <input type="file" id="file-input" accept=".mid,.midi" multiple>
  </div>
  <div class="track-list" id="track-list">
    <div class="empty-state" id="empty-state">
      No tracks yet.<br>
      Upload .mid files above to build your library.
    </div>
  </div>
</div>

<div class="card mixer">
  <div class="decks">
    <div class="deck deck-a">
      <div class="deck-letter">A</div>
      <div class="deck-name" id="label-a">— unassigned —</div>
    </div>
    <div class="deck deck-b">
      <div class="deck-letter">B</div>
      <div class="deck-name" id="label-b">— unassigned —</div>
    </div>
  </div>

  <div class="waves">
    <div class="deck deck-a"><div class="wave" id="wave-a"></div></div>
    <div class="deck deck-b"><div class="wave" id="wave-b"></div></div>
  </div>

  <div class="vu-row">
    <div class="deck deck-a" style="flex:1"><div class="vu"><div class="vu-fill" id="vu-a"></div></div></div>
    <div class="vu-lbl">vol</div>
    <div class="deck deck-b" style="flex:1"><div class="vu"><div class="vu-fill" id="vu-b"></div></div></div>
  </div>

  <div class="fader-wrap">
    <div class="rail"></div>
    <input type="range" id="xfader" min="0" max="100" value="50">
    <div class="thumb" id="thumb"></div>
  </div>
  <div class="fader-labels"><span>A only</span><span>blend</span><span>B only</span></div>

  <div class="ctrl">
    <button class="btn lit" id="play-btn" disabled>Play</button>
    <button class="btn" id="stop-btn" disabled>Stop</button>
    <button class="btn" id="center-btn">Center</button>
  </div>
  <div class="vols">A: <span id="vol-a">50%</span> &nbsp; B: <span id="vol-b">50%</span></div>
</div>

<div id="status">Upload two tracks and assign them to begin</div>
